googleAnalytics = "G-SDVMPQNJ0F"
baseURL = "https://petdoctorguide.com/"
enableGitInfo = true
languageCode = "en-us"
title = "Pet Doctor Guide"
[pagination]
  pagerSize = 12
enableRobotsTXT = true
enableEmoji = true

[params]
author = "Stephen Brenish"
  description = "Practical pet health guides covering symptoms, vet visits, nutrition, and preventive care for dogs and cats."
  niche = "Pet Health & Vet Advice"
  adsense_id = "ca-pub-3466203197759215"
  adsense_slot_header = "auto"
  adsense_slot_incontent = "auto"
  adsense_slot_sidebar = "auto"
  image_query = "pet dog cat health veterinarian clinic care"
  logo_text = "Pet Doctor Guide"
  tagline = "Keep your pets healthy — vet-reviewed guidance for dogs, cats, and more"
  primary_color = "#8b4513"
  cloudflare_analytics = ""

  # Authority theme
  hero_color_1 = "#1c0d00"
  hero_color_2 = "#7c2d12"
  hero_color_3 = "#c2410c"
  hero_color_4 = "#0f172a"
  monthly_readers = 34000
  research_hours  = 290
  satisfaction    = 96
  trust_extra     = "Veterinarian-reviewed content"
  impact_verification = ""
  impact_tracking_id   = ""

  persona_name       = "Becca Hamlin"
  persona_title      = "Pet Health Editor"
  persona_bio        = "Lifelong animal owner and pet health writer who has navigated vet costs, pet insurance, and animal care decisions across dogs, cats, and small animals."
  persona_initials   = "BH"
  disclaimer         = "This content is for informational purposes only and is not a substitute for professional veterinary advice. Always consult a licensed veterinarian for your pet's health needs."

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

[permalinks]
  posts = "/:slug/"

[related]
  includeNewer = true
  threshold    = 80
  toLower      = false
  [[related.indices]]
    name   = "keywords"
    weight = 100
  [[related.indices]]
    name   = "tags"
    weight = 80
  [[related.indices]]
    name   = "categories"
    weight = 50