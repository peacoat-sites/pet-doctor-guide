baseURL = "https://petdoctorguide.com/"
languageCode = "en-us"
title = "Pet Doctor Guide"
[pagination]
  pagerSize = 12
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Practical pet health guides covering symptoms, vet visits, nutrition, and preventive care for dogs and cats."
  niche = "Pet Health & Vet Advice"
  adsense_id = "ca-pub-3466203197759215"
  adsense_slot_header = "auto"
  adsense_slot_incontent = "auto"
  adsense_slot_sidebar = "auto"
  image_query = "pet dog cat health veterinarian clinic care"
  author = "Pet Doctor Guide Editorial Team"
  logo_text = "Pet Doctor Guide"
  tagline = "Keep your pets healthy — vet-reviewed guidance for dogs, cats, and more"
  primary_color = "#8b4513"
  cloudflare_analytics = ""

  # Authority theme
  hero_color_1 = "#1c0d00"
  hero_color_2 = "#7c2d12"
  hero_color_3 = "#c2410c"
  hero_color_4 = "#0f172a"
  monthly_readers = 34000
  research_hours  = 290
  satisfaction    = 96
  trust_extra     = "Veterinarian-reviewed content"
  impact_verification = ""
  impact_tracking_id   = "" 

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

[permalinks]
  posts = "/:slug/"
